    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- Suppress cross-origin Script errors dari third-party widget (TradingView) -->
    <!-- Harus di sini (sebelum React load) supaya jalan duluan sebelum CRA dev overlay -->
    <script>
      window.addEventListener('error', function(e) {
        if (e.message === 'Script error.' || (e.filename === '' && e.lineno === 0)) {
          e.stopImmediatePropagation();
          return false;
        }
      }, true);
    </script>

    <title>TotalFund</title>
  </head>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
